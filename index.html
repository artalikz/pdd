<!DOCTYPE html>
<html lang="kk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПДД тесті – дайындық</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f2f6fc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #0b1a33;
        }

        .container {
            max-width: 820px;
            width: 100%;
            background: white;
            border-radius: 36px;
            box-shadow: 0 20px 60px rgba(0, 20, 40, 0.12);
            padding: 32px 30px;
            transition: all 0.2s;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 span {
            background: #eef3f9;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            color: #2c3e50;
        }

        .controls-top {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
            background: #eef3f9;
            color: #1e2a3a;
        }

        .btn:hover {
            background: #dce4ed;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-success {
            background: #16a34a;
            color: white;
        }

        .btn-success:hover {
            background: #15803d;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #d0d9e8;
        }

        .btn-outline:hover {
            background: #f0f4fa;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ===== PROGRESS ===== */
        .progress-wrap {
            margin-bottom: 28px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #2563eb;
            border-radius: 10px;
            transition: width 0.25s ease;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #4a5b6e;
            margin-top: 6px;
        }

        /* ===== QUESTION ===== */
        .question-image {
            margin: 0 0 20px 0;
            text-align: center;
        }

        .question-image img {
            max-width: 100%;
            max-height: 260px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            background: #fafcff;
        }

        .question-text {
            font-size: 20px;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 24px;
            min-height: 60px;
        }

        .answers-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .answer-item {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 14px 18px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.12s;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .answer-item:hover:not(.disabled) {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        .answer-item.selected {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .answer-item.correct {
            border-color: #16a34a;
            background: #f0fdf4;
        }

        .answer-item.wrong {
            border-color: #dc2626;
            background: #fef2f2;
        }

        .answer-item.disabled {
            cursor: default;
            opacity: 0.75;
        }

        .answer-item .letter {
            font-weight: 600;
            color: #4a5b6e;
            min-width: 24px;
        }

        .answer-item.selected .letter {
            color: #2563eb;
        }

        .answer-item.correct .letter {
            color: #16a34a;
        }

        .answer-item.wrong .letter {
            color: #dc2626;
        }

        .radio-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #cbd5e1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.1s;
        }

        .answer-item.selected .radio-dot {
            border-color: #2563eb;
            background: #2563eb;
        }

        .answer-item.selected .radio-dot::after {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
        }

        .answer-item.correct .radio-dot {
            border-color: #16a34a;
            background: #16a34a;
        }

        .answer-item.correct .radio-dot::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .answer-item.wrong .radio-dot {
            border-color: #dc2626;
            background: #dc2626;
        }

        .answer-item.wrong .radio-dot::after {
            content: '✕';
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        /* ===== NAVIGATION ===== */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-top: 1px solid #e2e8f0;
            padding-top: 22px;
        }

        .nav-left {
            display: flex;
            gap: 10px;
        }

        /* ===== RESULTS ===== */
        .results {
            display: none;
            margin-top: 10px;
        }

        .results.active {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin: 24px 0 28px;
        }

        .stat-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 18px 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 34px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 14px;
            color: #4a5b6e;
            margin-top: 4px;
        }

        .stat-card.green .stat-number {
            color: #16a34a;
        }

        .stat-card.red .stat-number {
            color: #dc2626;
        }

        .stat-card.blue .stat-number {
            color: #2563eb;
        }

        .error-list {
            background: #fef2f2;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            border-left: 4px solid #dc2626;
        }

        .error-list h3 {
            font-size: 18px;
            color: #991b1b;
            margin-bottom: 12px;
        }

        .error-item {
            padding: 10px 0;
            border-bottom: 1px solid #fecaca;
        }

        .error-item:last-child {
            border-bottom: none;
        }

        .error-question {
            font-weight: 500;
        }

        .error-answer {
            color: #16a34a;
            font-weight: 500;
            margin-top: 4px;
        }

        .error-user {
            color: #991b1b;
            font-size: 14px;
        }

        .flex-center {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 640px) {
            .container {
                padding: 20px 16px;
            }

            .header h1 {
                font-size: 20px;
            }

            .question-text {
                font-size: 17px;
            }

            .answer-item {
                padding: 12px 14px;
                font-size: 15px;
            }

            .stats {
                grid-template-columns: 1fr 1fr;
            }

            .nav {
                flex-direction: column;
                align-items: stretch;
            }

            .nav-left {
                justify-content: center;
            }

            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

        const progressText = document.getElementById('progressText');
        const progressPercent = document.getElementById('progressPercent');
        const questionImage = document.getElementById('questionImage');
        const questionText = document.getElementById('questionText');
        const answersContainer = document.getElementById('answersContainer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const finishBtn = document.getElementById('finishBtn');
        const shuffleQuestionsBtn = document.getElementById('shuffleQuestionsBtn');
        const shuffleAnswersBtn = document.getElementById('shuffleAnswersBtn');
        const restartBtn = document.getElementById('restartBtn');
        const correctCountEl = document.getElementById('correctCount');
        const wrongCountEl = document.getElementById('wrongCount');
        const percentScoreEl = document.getElementById('percentScore');
        const errorListContainer = document.getElementById('errorListContainer');

        const letters = ['A', 'B', 'C', 'D'];

        // ================================================================
        //  UTILITY
        // ================================================================
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ================================================================
        //  INIT / RESET
        // ================================================================
        function initQuiz() {
            // Копируем исходные данные
            questions = rawQuestions.map(q => ({
                ...q,
                answers: [...q.answers],
                correct: q.correct
            }));
            userAnswers = new Array(questions.length).fill(null);
            currentIndex = 0;
            quizCompleted = false;
            render();
        }

        // ================================================================
        //  SHUFFLE QUESTIONS
        // ================================================================
        function shuffleQuestions() {
            if (quizCompleted) return;
            // Перемешиваем вопросы, сохраняя соответствие userAnswers
            const indices = Array.from({ length: questions.length }, (_, i) => i);
            shuffleArray(indices);
            const newQuestions = [];
            const newAnswers = [];
            for (let i = 0; i < indices.length; i++) {
                const idx = indices[i];
                newQuestions.push(questions[idx]);
                newAnswers.push(userAnswers[idx]);
            }
            questions = newQuestions;
            userAnswers = newAnswers;
            currentIndex = 0;
            render();
        }

        // ================================================================
        //  SHUFFLE ANSWERS FOR CURRENT QUESTION (with correct index update)
        // ================================================================
        function shuffleAnswersForCurrent() {
            if (quizCompleted) return;
            const q = questions[currentIndex];
            // Сохраняем правильный ответ
            const correctText = q.answers[q.correct];
            // Перемешиваем ответы
            const shuffled = shuffleArray([...q.answers]);
            // Находим новый индекс правильного ответа
            const newCorrect = shuffled.indexOf(correctText);
            q.answers = shuffled;
            q.correct = newCorrect;
            // Если пользователь уже выбрал ответ, обновляем его индекс
            const currentUserAnswer = userAnswers[currentIndex];
            if (currentUserAnswer !== null) {
                // старый текст
                const oldText = q.answers[currentUserAnswer]; // но мы уже изменили массив, поэтому нужно сохранить до изменения
                // переделаем: сначала сохраним старый массив, потом перемешаем, потом обновим
                // проще: запомнить выбранный текст до перемешивания
                // переделаем функцию
            }
            // Переделаем: сначала запомним выбранный текст, если он есть
            const selectedText = (userAnswers[currentIndex] !== null) ? q.answers[userAnswers[currentIndex]] : null;
            // Теперь перемешиваем
            const oldAnswers = [...q.answers];
            const correctIdx = q.correct;
            const correctText2 = oldAnswers[correctIdx];
            const shuffled2 = shuffleArray([...oldAnswers]);
            q.answers = shuffled2;
            q.correct = shuffled2.indexOf(correctText2);
            // Обновляем userAnswer
            if (selectedText !== null) {
                const newIdx = shuffled2.indexOf(selectedText);
                userAnswers[currentIndex] = (newIdx !== -1) ? newIdx : null;
            }
            render();
        }

        // ================================================================
        //  RENDER CURRENT QUESTION
        // ================================================================
        function render() {
            if (quizCompleted) {
                showResults();
                return;
            }
            const total = questions.length;
            const q = questions[currentIndex];
            const selected = userAnswers[currentIndex];

            // Header
            countDisplay.textContent = `${currentIndex + 1} / ${total}`;

            // Progress
            const progress = ((currentIndex + 1) / total) * 100;
            progressFill.style.width = progress + '%';
            progressText.textContent = `Сұрақ ${currentIndex + 1} / ${total}`;
            progressPercent.textContent = Math.round(progress) + '%';

            // Image
            questionImage.innerHTML = '';
            if (q.image) {
                const img = document.createElement('img');
                img.src = q.image;
                img.alt = 'Сурет';
                questionImage.appendChild(img);
            }

            // Question text
            questionText.textContent = q.question;

            // Answers
            answersContainer.innerHTML = '';
            q.answers.forEach((text, idx) => {
                const div = document.createElement('div');
                div.className = 'answer-item';
                if (selected === idx) div.classList.add('selected');

                const dot = document.createElement('span');
                dot.className = 'radio-dot';

                const letterSpan = document.createElement('span');
                letterSpan.className = 'letter';
                letterSpan.textContent = letters[idx] + '.';

                const textSpan = document.createElement('span');
                textSpan.textContent = text;

                div.appendChild(dot);
                div.appendChild(letterSpan);
                div.appendChild(textSpan);

                if (!quizCompleted) {
                    div.addEventListener('click', () => selectAnswer(idx));
                }

                answersContainer.appendChild(div);
            });

            // Navigation buttons
            prevBtn.disabled = currentIndex === 0;
            if (currentIndex === total - 1) {
                nextBtn.textContent = '📌 Соңғы';
                nextBtn.disabled = true;
            } else {
                nextBtn.textContent = 'Келесі ➡';
                nextBtn.disabled = false;
            }

            // Finish button visible
            finishBtn.style.display = 'inline-block';
            quizView.style.display = 'block';
            resultsView.classList.remove('active');
        }

        // ================================================================
        //  SELECT ANSWER
        // ================================================================
        function selectAnswer(index) {
            if (quizCompleted) return;
            userAnswers[currentIndex] = index;
            render();
            // Auto-advance to next question after short delay
            if (currentIndex < questions.length - 1) {
                setTimeout(() => goToNext(), 300);
            }
        }

        // ================================================================
        //  NAVIGATION
        // ================================================================
        function goToPrev() {
            if (currentIndex > 0) {
                currentIndex--;
                render();
            }
        }

        function goToNext() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                render();
            }
        }

        // ================================================================
        //  FINISH QUIZ
        // ================================================================
        function finishQuiz() {
            if (quizCompleted) return;
            const unanswered = userAnswers.some(a => a === null);
            if (unanswered) {
                if (!confirm('Сіз барлық сұрақтарға жауап бермедіңіз. Тестті аяқтағыңыз келе ме?')) return;
            }
            quizCompleted = true;
            // Подсветка правильных/неправильных на текущем вопросе
            render(); // перерисовываем с подсветкой
            // Но render() сейчас не показывает подсветку, потому что quizCompleted = true, но мы не обрабатываем этот случай в render.
            // Переделаем: если quizCompleted, то вызываем showResults(), но перед этим можно показать подсветку на текущем вопросе.
            // Лучше просто показать результаты.
            showResults();
        }

        // ================================================================
        //  SHOW RESULTS
        // ================================================================
        function showResults() {
            // Сначала подсветим ответы на текущем вопросе (если нужно)
            // Но мы просто покажем результаты.
            quizView.style.display = 'none';
            resultsView.classList.add('active');

            // Подсчёт
            let correct = 0;
            let wrong = 0;
            const errors = [];

            questions.forEach((q, idx) => {
                const userAns = userAnswers[idx];
                if (userAns === null) {
                    wrong++;
                    errors.push({
                        question: q.question,
                        correctAnswer: q.answers[q.correct],
                        userAnswer: 'Жауап берілмеді'
                    });
                } else if (userAns === q.correct) {
                    correct++;
                } else {
                    wrong++;
                    errors.push({
                        question: q.question,
                        correctAnswer: q.answers[q.correct],
                        userAnswer: q.answers[userAns] || 'Белгісіз'
                    });
                }
            });

            const total = questions.length;
            const percent = Math.round((correct / total) * 100);

            correctCountEl.textContent = correct;
            wrongCountEl.textContent = wrong;
            percentScoreEl.textContent = percent + '%';

            errorListContainer.innerHTML = '';
            if (errors.length > 0) {
                const div = document.createElement('div');
                div.className = 'error-list';
                const h3 = document.createElement('h3');
                h3.textContent = `❌ Қате сұрақтар (${errors.length})`;
                div.appendChild(h3);
                errors.forEach(e => {
                    const item = document.createElement('div');
                    item.className = 'error-item';
                    item.innerHTML = `
                    <div class="error-question">${e.question}</div>
                    <div class="error-answer">✅ Дұрыс жауап: ${e.correctAnswer}</div>
                    <div class="error-user">❌ Сіздің жауабыңыз: ${e.userAnswer}</div>
                `;
                    div.appendChild(item);
                });
                errorListContainer.appendChild(div);
            } else {
                errorListContainer.innerHTML = '<div style="background:#f0fdf4; padding:20px; border-radius:16px; border-left:4px solid #16a34a; margin-bottom:24px;"><p style="font-size:18px; font-weight:500; color:#166534;">🎉 Барлық сұрақтарға дұрыс жауап бердіңіз!</p></div>';
            }

            finishBtn.style.display = 'none';
        }

        // ================================================================
        //  RESTART
        // ================================================================
        function restartQuiz() {
            initQuiz();
            // Очищаем результаты
            resultsView.classList.remove('active');
            quizView.style.display = 'block';
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ================================================================
        //  EVENT LISTENERS
        // ================================================================
        prevBtn.addEventListener('click', goToPrev);
        nextBtn.addEventListener('click', goToNext);
        finishBtn.addEventListener('click', finishQuiz);
        restartBtn.addEventListener('click', restartQuiz);
        shuffleQuestionsBtn.addEventListener('click', shuffleQuestions);
        shuffleAnswersBtn.addEventListener('click', shuffleAnswersForCurrent);

        // Keyboard arrows
        document.addEventListener('keydown', (e) => {
            if (quizCompleted || resultsView.classList.contains('active')) return;
            if (e.key === 'ArrowLeft') goToPrev();
            if (e.key === 'ArrowRight') goToNext();
        });

        // ================================================================
        //  START
        // ================================================================
        initQuiz();
    </script>
</body>

</html>

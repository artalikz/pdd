<!DOCTYPE html>
<html lang="kk">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ПДД тесті – дайындық</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="container">
                <h1>🚗 ПДД тесті</h1>
                <span class="badge" id="progressBadge">1 / 20</span>
            </div>
        </header>

        <!-- Main content -->
        <main class="main container">

            <!-- Progress bar -->
            <div class="progress-wrapper">
                <div class="progress-bar" id="progressBar" style="width: 5%;"></div>
            </div>

            <!-- Question card -->
            <div class="card" id="questionCard">
                <!-- Image -->
                <div class="image-wrapper" id="imageWrapper" style="display: none;">
                    <img id="questionImage" src="" alt="Сұрақ суреті" />
                </div>

                <!-- Question text -->
                <h2 class="question-text" id="questionText">Сұрақ жүктелуде…</h2>

                <!-- Answers -->
                <div class="answers-list" id="answersList"></div>

                <!-- Navigation -->
                <div class="nav-row">
                    <button class="btn btn-outline" id="prevBtn" disabled>⬅ Артқа</button>
                    <button class="btn btn-primary" id="nextBtn">Келесі ➡</button>
                    <button class="btn btn-danger" id="finishBtn">✅ Аяқтау</button>
                </div>
            </div>

            <!-- Results -->
            <div class="card" id="resultsCard" style="display: none;">
                <h2 class="results-title">📊 Нәтижелер</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">✅ Дұрыс</span>
                        <span class="stat-value" id="correctCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">❌ Қате</span>
                        <span class="stat-value" id="wrongCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">📈 Пайыз</span>
                        <span class="stat-value" id="percentCount">0%</span>
                    </div>
                </div>

                <div id="errorsList">
                    <h3>Қате сұрақтар</h3>
                    <ul id="errorItems"></ul>
                </div>

                <button class="btn btn-primary" id="retryBtn" style="margin-top: 24px;">🔄 Қайтадан бастау</button>
            </div>

        </main>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
